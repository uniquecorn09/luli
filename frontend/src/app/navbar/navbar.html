<mat-toolbar color="primary" class="navbar">
  <span class="nav-links desktop-only">
    <a mat-button routerLink="/">Alle Tonies</a>
    <a mat-button routerLink="/wishlist">Wunschliste</a>
    <a mat-button routerLink="/owned">Hab ich schon!</a>
  </span>
  <span class="spacer"></span>
  <a
    mat-button
    routerLink="/profile"
    *ngIf="auth.isLoggedIn()"
    class="desktop-only"
    style="margin-left: auto"
    >Profil</a
  >
  <!-- Menüicon für Mobil -->
  <button mat-icon-button class="mobile-only" (click)="toggleMenu()">
    <mat-icon>{{ menuOpen ? "close" : "menu" }}</mat-icon>
  </button>
</mat-toolbar>
<!-- Mobiles Menü -->
<div class="mobile-menu" *ngIf="menuOpen">
  <a mat-button routerLink="/" (click)="toggleMenu()">Alle Tonies</a>
  <div class="menu-separator"></div>
  <a mat-button routerLink="/wishlist" (click)="toggleMenu()">Wunschliste</a>
  <div class="menu-separator"></div>
  <a mat-button routerLink="/owned" (click)="toggleMenu()">Hab ich schon!</a>
  <div class="menu-separator" *ngIf="auth.isLoggedIn()"></div>
  <a
    mat-button
    routerLink="/profile"
    *ngIf="auth.isLoggedIn()"
    (click)="toggleMenu()"
    >Profil</a
  >
</div>
